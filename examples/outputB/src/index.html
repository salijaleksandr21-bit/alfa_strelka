<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>МойТаскер</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>МойТаскер</h1>
      <div class="stats" id="stats">Всего задач: 0, Выполнено: 0</div>
      <div class="toolbar">
        <button id="addTaskBtn" class="btn btn-primary">Новая задача</button>
        <select id="filterSelect">
          <option value="all">Все</option>
          <option value="todo">К выполнению</option>
          <option value="inprogress">В работе</option>
          <option value="done">Выполнено</option>
        </select>
      </div>
    </header>
    <main class="board" id="board">
      <div class="column" data-status="todo">
        <h2 class="column-title">К выполнению</h2>
        <div class="column-cards" id="columnTodo"></div>
      </div>
      <div class="column" data-status="inprogress">
        <h2 class="column-title">В работе</h2>
        <div class="column-cards" id="columnInProgress"></div>
      </div>
      <div class="column" data-status="done">
        <h2 class="column-title">Выполнено</h2>
        <div class="column-cards" id="columnDone"></div>
      </div>
    </main>
  </div>

  <!-- Модальное окно создания задачи -->
  <div class="modal-overlay" id="createModalOverlay">
    <div class="modal" id="createModal">
      <h3>Новая задача</h3>
      <form id="createForm">
        <label for="taskTitle">Название *</label>
        <input type="text" id="taskTitle" maxlength="500" required autofocus>
        <label for="taskDescription">Описание</label>
        <textarea id="taskDescription" maxlength="2000" rows="3"></textarea>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Создать</button>
          <button type="button" class="btn btn-secondary" id="createCancelBtn">Отмена</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Модальное окно подтверждения удаления -->
  <div class="modal-overlay" id="confirmModalOverlay">
    <div class="modal" id="confirmModal">
      <h3>Удаление задачи</h3>
      <p>Вы уверены, что хотите удалить задачу?</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="confirmDeleteBtn">Удалить</button>
        <button class="btn btn-secondary" id="confirmCancelBtn">Отмена</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
