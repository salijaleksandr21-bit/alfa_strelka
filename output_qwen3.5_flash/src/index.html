<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CurrFlow - Конвертер валют</title>
    <!-- БЕЗОПАСНОСТЬ: Content Security Policy (CSP) для предотвращения XSS атак -->
    <!-- Запрещает выполнение скриптов из сторонних источников и eval() -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.exchangerate-api.com;">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CurrFlow</h1>
            <p class="subtitle">Безопасный конвертер валют</p>
        </header>

        <main>
            <!-- Индикатор загрузки -->
            <div id="loader" class="loader hidden"></div>

            <!-- Плашка предупреждения об устаревших данных -->
            <div id="stale-warning" class="alert alert-warning hidden">
                <span class="alert-icon">⚠️</span>
                <div>
                    <strong>Данные устарели</strong>
                    <p id="stale-date">Последнее обновление: --</p>
                </div>
            </div>

            <div class="converter-card">
                <div class="input-group">
                    <label for="amount">Сумма</label>
                    <input type="text" id="amount" placeholder="0.00" inputmode="decimal" autocomplete="off">
                    <span id="error-msg" class="error-message hidden"></span>
                </div>

                <div class="currency-row">
                    <div class="currency-select">
                        <label for="from-currency">Из</label>
                        <select id="from-currency"></select>
                    </div>

                    <button id="swap-btn" class="swap-btn" title="Поменять местами">⇄</button>

                    <div class="currency-select">
                        <label for="to-currency">В</label>
                        <select id="to-currency"></select>
                    </div>
                </div>

                <div class="result-block">
                    <div class="result-main">
                        <span id="result-amount">0.00</span>
                        <span id="result-currency" class="currency-code"></span>
                    </div>
                    <div class="rate-info">
                        Курс: 1 <span id="rate-from">USD</span> = <span id="rate-value">0.00</span> <span id="rate-to">RUB</span>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2023 CurrFlow. Безопасная конвертация.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
