<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSP: Запрет unsafe-eval, разрешение self и inline стилей/скриптов для данного демо -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://open.er-api.com;">
    <title>CurrFlow — Конвертер валют</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>CurrFlow</h1>
        </header>

        <main>
            <div id="api-status" class="status-banner hidden">Данные устарели</div>

            <div class="converter-card">
                <div class="input-group">
                    <label for="amount">Сумма</label>
                    <input type="text" id="amount" placeholder="0.00" autocomplete="off">
                    <div id="error-message" class="error-text hidden">Введите корректную сумму</div>
                </div>

                <div class="currency-selectors">
                    <div class="select-wrapper">
                        <label for="from-currency">Из</label>
                        <select id="from-currency"></select>
                    </div>

                    <button id="swap-btn" title="Поменять валюты местами">⇄</button>

                    <div class="select-wrapper">
                        <label for="to-currency">В</label>
                        <select id="to-currency"></select>
                    </div>
                </div>

                <div class="result-container">
                    <div id="loader" class="spinner hidden"></div>
                    <div id="result-display">
                        <div class="result-value" id="converted-amount">0.00</div>
                        <div class="exchange-rate" id="rate-info">1 USD = 0.00 EUR</div>
                        <div class="cache-date" id="cache-date"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
