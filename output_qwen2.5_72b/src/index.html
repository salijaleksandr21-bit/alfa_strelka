<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CurrFlow - Конвертер валют</title>
    
    <!-- БЕЗОПАСНОСТЬ: Content Security Policy (CSP) -->
    <!-- Запрещает загрузку скриптов и стилей с внешних доменов, кроме 'self' -->
    <!-- Запрещает выполнение eval() и инлайн-скриптов -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.exchangerate-api.com;">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CurrFlow</h1>
            <p class="subtitle">Надежный конвертер валют</p>
        </header>

        <main>
            <div class="converter-card">
                <!-- Блок выбора валют -->
                <div class="currency-row">
                    <div class="input-group">
                        <label for="from-currency">Из:</label>
                        <select id="from-currency" class="currency-select"></select>
                    </div>

                    <button id="swap-btn" class="swap-btn" title="Поменять местами">⇄</button>

                    <div class="input-group">
                        <label for="to-currency">В:</label>
                        <select id="to-currency" class="currency-select"></select>
                    </div>
                </div>

                <!-- Блок ввода суммы -->
                <div class="amount-row">
                    <div class="input-group">
                        <label for="amount">Сумма:</label>
                        <input type="text" id="amount" placeholder="0.00" autocomplete="off">
                    </div>
                </div>

                <!-- Блок результата -->
                <div class="result-row">
                    <div class="result-display">
                        <span id="result-amount">0.00</span>
                        <span id="result-currency">USD</span>
                    </div>
                    <div class="rate-info" id="rate-info">
                        <!-- Сюда будет вставлен курс -->
                    </div>
                </div>

                <!-- Индикаторы состояния -->
                <div id="loading-spinner" class="spinner hidden"></div>
                <div id="error-message" class="alert alert-warning hidden"></div>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 CurrFlow. Безопасная конвертация.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
